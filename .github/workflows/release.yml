name: Release

on:
    workflow_dispatch:
        inputs:
            release_type:
                description: "Version bump type"
                required: true
                type: choice
                default: patch
                options:
                    - patch
                    - minor
                    - major
                    - prepatch
                    - preminor
                    - premajor
                    - prerelease

concurrency:
    group: npm-release
    cancel-in-progress: false

jobs:
    release:
        runs-on: ubuntu-latest

        permissions:
            contents: write
            id-token: write

        env:
            PACKAGE_NAME: "@omss/core"

        steps:
            - uses: actions/create-github-app-token@v3
              id: app-token
              with:
                  client-id: ${{ secrets.APP_CLIENT_ID }}
                  private-key: ${{ secrets.APP_PRIVATE_KEY }}

            - name: Get GitHub App User ID
              id: get-user-id
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

            - uses: actions/checkout@v4
              with:
                  ref: main
                  fetch-depth: 0
                  token: ${{ steps.app-token.outputs.token }}

            - name: Configure GitHub App identity
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  git config --global user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
                  git config --global user.email "${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
                  gh auth setup-git

            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  registry-url: "https://registry.npmjs.org"
                  cache: npm

            - name: Update npm for OIDC publishing compatibility
              run: npm install -g npm@latest

            - name: Install dependencies
              run: npm ci

            - name: Bump package version
              id: version
              run: |
                  RELEASE_TYPE="${{ github.event.inputs.release_type }}"

                  if echo "$RELEASE_TYPE" | grep -q "^pre"; then
                    npm version "$RELEASE_TYPE" --preid=beta
                  else
                    npm version "$RELEASE_TYPE"
                  fi

                  VERSION=$(node -p "require('./package.json').version")

                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

            - name: Test
              run: npm run test

            - name: Build
              run: npm run build

            - name: Push version commit and tag
              run: |
                  git push origin main --follow-tags


            - name: Check whether version exists on npm
              id: npm_check
              run: |
                  if npm view "${PACKAGE_NAME}@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
                    echo "published=true" >> "$GITHUB_OUTPUT"
                    echo "Already published."
                  else
                    echo "published=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Publish to npm
              if: steps.npm_check.outputs.published != 'true'
              run: |
                  VERSION="${{ steps.version.outputs.version }}"

                  if echo "$VERSION" | grep -q -- "-beta\."; then
                    npm publish --provenance --tag beta --access public
                  else
                    npm publish --provenance --access public
                  fi

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  TAG="${{ steps.version.outputs.tag }}"
                  VERSION="${{ steps.version.outputs.version }}"

                  if gh release view "$TAG" >/dev/null 2>&1; then
                    echo "Release already exists."
                    exit 0
                  fi

                  if echo "$VERSION" | grep -q -- "-beta\."; then
                    gh release create "$TAG" \
                      --title "$TAG" \
                      --generate-notes \
                      --prerelease
                  else
                    gh release create "$TAG" \
                      --title "$TAG" \
                      --generate-notes
                  fi

            - name: Summary
              run: |
                  {
                    echo "## Release completed"
                    echo
                    echo "- Version: \`${{ steps.version.outputs.version }}\`"
                    echo "- Tag: \`${{ steps.version.outputs.tag }}\`"
                    echo "- npm package: \`${PACKAGE_NAME}\`"
                  } >> "$GITHUB_STEP_SUMMARY"
