name: PR Template Check

# This workflow has been adapted from: https://github.com/NuvioMedia/NuvioMobile/blob/cmp-rewrite/.github/workflows/pr-template-check.yml

on:
    pull_request:
        types: [opened, edited, synchronize, reopened]

permissions:
    pull-requests: read

jobs:
    validate_pr_body:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/create-github-app-token@v3
                id: app-token
                with:
                    client-id: ${{ secrets.APP_CLIENT_ID }}
                    private-key: ${{ secrets.APP_PRIVATE_KEY }}

            - name: Validate required PR sections
              uses: actions/github-script@v7
              with:
                  script: |
                      const pr = context.payload.pull_request;
                      const body = (pr.body || "").trim();

                      function sectionContent(title) {
                        const escaped = title.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
                        const re = new RegExp(`^##\\s+${escaped}\\s*$`, "m");
                        const match = body.match(re);

                        if (!match) return null;

                        const start = match.index + match[0].length;
                        const rest = body.slice(start);
                        const next = rest.search(/^##\s+/m);

                        return (next === -1 ? rest : rest.slice(0, next)).trim();
                      }

                      function cleanedContent(title) {
                        const content = sectionContent(title);

                        if (content === null) return null;

                        return content
                          .replace(/<!--[\s\S]*?-->/g, "")
                          .replace(/`/g, "")
                          .replace(/\s+/g, " ")
                          .trim();
                      }

                      function checkedLines(content) {
                        return (content || "").match(/^\s*-\s+\[[xX]\]\s+.+$/gm) || [];
                      }

                      function hasIssueReference(content) {
                        return /(^|\s)(#\d+|https:\/\/github\.com\/\S+\/issues\/\d+)/i.test(content || "");
                      }

                      const required = [
                        "Description",
                        "Related Issue",
                        "Type of Change",
                        "Checklist",
                      ];

                      const missing = [];
                      const empty = [];
                      const failedRules = [];

                      for (const section of required) {
                        const content = sectionContent(section);

                        if (content === null) {
                          missing.push(section);
                          continue;
                        }

                        const cleaned = cleanedContent(section);
                        const normalized = cleaned.toLowerCase();

                        if (
                          cleaned.length < 4 ||
                          normalized.includes("please describe the changes in this pr") ||
                          normalized.includes("link to the issue this pr addresses")
                        ) {
                          empty.push(section);
                        }
                      }

                      // Require exactly one change type
                      const typeContent = sectionContent("Type of Change") || "";
                      const checkedTypes = checkedLines(typeContent);

                      if (checkedTypes.length !== 1) {
                        failedRules.push("Select exactly one Type of Change.");
                      }

                      // Require issue reference for bug fixes and breaking changes
                      const selectedType = checkedTypes.join(" ");
                      const issueRequired =
                        /bug fix|breaking change/i.test(selectedType);

                      const issueText = cleanedContent("Related Issue") || "";

                      if (issueRequired && !hasIssueReference(issueText)) {
                        failedRules.push(
                          "Bug fixes and breaking changes must reference a related issue."
                        );
                      }

                      // Require all checklist items checked
                      const checklistContent = sectionContent("Checklist") || "";
                      const checklistUnchecked =
                        checklistContent.match(/^\s*-\s+\[\s\]\s+.+$/gm) || [];

                      if (checklistUnchecked.length) {
                        failedRules.push(
                          "All Checklist items must be checked before review."
                        );
                      }

                      if (missing.length || empty.length || failedRules.length) {
                        const lines = [
                          "PR description is missing required information.",
                          "",
                        ];

                        if (missing.length) {
                          lines.push(`Missing sections: ${missing.join(", ")}`);
                        }

                        if (empty.length) {
                          lines.push(`Incomplete sections: ${empty.join(", ")}`);
                        }

                        if (failedRules.length) {
                          lines.push(`Failed checks: ${failedRules.join(" ")}`);
                        }

                        lines.push("");
                        lines.push(
                          "Please complete the PR template before requesting review."
                        );

                        core.setFailed(lines.join("\n"));
                      } else {
                        core.info("PR template check passed.");
                      }
                  github-token: '${{ steps.app-token.outputs.token }}'
