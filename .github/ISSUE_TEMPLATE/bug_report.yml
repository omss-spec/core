name: Bug Report
description: Report a bug in OMSS Core
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the form below as completely as possible.

        > [!CAUTION]
        > **Security vulnerabilities** should be reported privately via [SECURITY.md](https://github.com/omss-spec/core/blob/main/SECURITY.md), not here.

  - type: input
    id: version
    attributes:
      label: "@omss/core version"
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. 22.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Please provide a minimal reproduction case.
      placeholder: |
        1. Create a server with ...
        2. Register plugin ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, stack trace, or information that might help.
