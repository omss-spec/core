name: Bug Report
description: Report a bug in OMSS Core
labels: ["bug", "triage"]
title: "[Bug]: short summary here"
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the form below as completely as possible.

        Vague reports such as "not working", "broken", or "same issue" may be labeled `needs-info` and closed after 1 day if the missing details are not added.
        Bug reports with no activity for more than 30 days may be closed as stale.

          > [!NOTE]
        > Before reporting, please check if your issue is already reported in the [existing issues](https://github.com/omss-spec/core/issues).

        > [!CAUTION]
        > **Security vulnerabilities** should be reported privately via [SECURITY.md](https://github.com/omss-spec/core/blob/main/SECURITY.md), not here.


  - type: input
    id: version
    attributes:
      label: "@omss/core version"
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. 22.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Please provide a minimal reproduction case.
      placeholder: |
        1. Create a server with ...
        2. Register plugin ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, stack trace, or information that might help.

  - type: checkboxes
    attributes:
        label: Prerequisites
        description: '**Please check these before submitting:**'
        options:
            - label: I have checked the existing issues and this is not a duplicate
              required: true
            - label: I have included all relevant details in this report
              required: true
            - label: I did not answer truthfully to **ALL** the above checkboxes
              required: false

  - type: checkboxes
    id: terms
    attributes:
        label: Code of Conduct
        description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/omss-spec/core/blob/main/CODE_OF_CONDUCT.md)
        options:
            - label: I agree to follow this project's Code of Conduct
              required: true
