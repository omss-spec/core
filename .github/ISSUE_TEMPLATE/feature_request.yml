name: Feature Request
description: Suggest a new feature or improvement for OMSS Core
title: "[feat]: short summary here "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to suggest a feature! Please describe the **problem** you want to solve, not just the solution.

        > [!NOTE]
        > Before reporting, please check if your request is already reported in the [existing issues](https://github.com/omss-spec/core/issues).

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What problem are you trying to solve? What is the current limitation?
      placeholder: "I'm trying to do X but currently OMSS Core doesn't support it because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see. Include code examples if possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context or screenshots about the feature request.

  - type: checkboxes
    attributes:
        label: Prerequisites
        description: '**Please check these before submitting:**'
        options:
            - label: I have checked the existing issues and this is not a duplicate
              required: true
            - label: I have included all relevant details in this report
              required: true
            - label: I did not answer truthfully to **ALL** the above checkboxes
              required: false

  - type: checkboxes
    id: terms
    attributes:
        label: Code of Conduct
        description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/omss-spec/core/blob/main/CODE_OF_CONDUCT.md)
        options:
            - label: I agree to follow this project's Code of Conduct
              required: true
